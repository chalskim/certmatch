<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CertMatch - 인증 Q&A</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        
        .app-content {
            padding: 20px;
            padding-bottom: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* View Containers */
        .view {
            display: none;
        }
        .view.active {
            display: block;
        }

        /* App Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #4a6fdc;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-icon {
            font-size: 20px;
            cursor: pointer;
        }
        .app-title {
            font-size: 18px;
            font-weight: bold;
        }
        .header-icons {
            display: flex;
            gap: 15px;
        }
        .header-icon {
            position: relative;
        }
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #e74c3c;
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 70px 0 20px;
        }
        .page-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .write-btn {
            background-color: #4a6fdc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background-color 0.3s;
        }
        .write-btn:hover {
            background-color: #3a5fcd;
        }

        /* Sort Tabs */
        .sort-tabs {
            display: flex;
            background-color: white;
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .sort-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            background: none;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            color: #666;
            transition: all 0.3s;
        }
        .sort-tab.active {
            background-color: #4a6fdc;
            color: white;
        }

        /* Q&A Item */
        .qa-item {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .qa-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        .qa-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .qa-category {
            background-color: #e8f0fe;
            color: #4a6fdc;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
        }
        .qa-stats {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #999;
        }
        .qa-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }
        .qa-content {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .qa-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #888;
        }
        .qa-author {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .qa-actions {
            display: flex;
            gap: 10px;
        }
        .qa-actions button {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            transition: color 0.3s;
        }
        .qa-actions button.liked {
            color: #e74c3c;
        }
        .qa-actions button.bookmarked {
            color: #f39c12;
        }

        /* Sub Header */
        .sub-header {
            display: flex;
            align-items: center;
            margin: 70px 0 20px;
            gap: 10px;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #4a6fdc;
        }
        .sub-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        /* Question Detail View */
        .question-detail {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .question-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .question-body {
            font-size: 15px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 15px;
        }
        .question-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #888;
        }

        /* Answer Section */
        .answer-section {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .answer-count {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        .answer-card {
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        .answer-card:last-child {
            border-bottom: none;
        }
        .answer-card.best {
            border: 1px solid #28a745;
            border-radius: 5px;
            padding: 15px;
            background-color: #f8fff9;
        }
        .best-answer-badge {
            display: inline-block;
            background-color: #28a745;
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .answer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .answer-author {
            font-weight: 500;
        }
        .expert-badge {
            background-color: #ffc107;
            color: #333;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 5px;
        }
        .answer-body {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }
        .answer-actions {
            margin-top: 10px;
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #888;
        }
        .answer-actions button {
            background: none;
            border: none;
            cursor: pointer;
        }

        /* Comments Section */
        .comments-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        .comment-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            padding: 8px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }
        .comment-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
            flex-shrink: 0;
        }
        .comment-content {
            flex: 1;
        }
        .comment-author {
            font-size: 12px;
            font-weight: 500;
            color: #555;
            margin-bottom: 3px;
        }
        .comment-text {
            font-size: 13px;
            color: #333;
            line-height: 1.4;
        }
        .comment-date {
            font-size: 11px;
            color: #999;
            margin-top: 3px;
        }
        .comment-input-container {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .comment-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.3s;
        }
        .comment-input:focus {
            border-color: #4a6fdc;
        }
        .comment-submit-btn {
            background-color: #4a6fdc;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 15px;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .comment-submit-btn:hover {
            background-color: #3a5fcd;
        }

        /* Write Answer Form */
        .write-answer-form {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .btn-primary {
            background-color: #4a6fdc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }
        .btn-primary:hover {
            background-color: #3a5fcd;
        }

        /* Modal */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto; 
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .modal-header h3 {
            margin: 0;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- App Header -->
    <header class="app-header">
        <div class="header-icon" id="menuToggle">
            <i class="fas fa-bars"></i>
        </div>
        <div class="app-title">인증 Q&A</div>
        <div class="header-icons">
            <div class="header-icon">
                <i class="fas fa-bell"></i>
                <span class="notification-badge">3</span>
            </div>
            <div class="header-icon">
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
    </header>

    <!-- App Content -->
    <div class="app-content">
        <!-- View 1: Q&A List -->
        <div id="qaListView" class="view active">
            <div class="page-header">
                <h1 class="page-title">인증 Q&A</h1>
                <button class="write-btn" onclick="showWriteModal()">
                    <i class="fas fa-pen"></i> 질문하기
                </button>
            </div>

            <div class="sort-tabs">
                <button class="sort-tab active" onclick="sortQuestions('latest')">최신순</button>
                <button class="sort-tab" onclick="sortQuestions('popular')">인기순</button>
            </div>

            <div id="qaListContainer">
                <!-- Q&A items will be dynamically generated here -->
            </div>
        </div>

        <!-- View 2: Question Detail -->
        <div id="questionDetailView" class="view">
            <div class="sub-header">
                <button class="back-btn" onclick="showView('qaListView')">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2 class="sub-title">질문 상세</h2>
            </div>

            <div id="questionDetailContainer">
                <!-- Question detail will be dynamically generated here -->
            </div>

            <div id="answersContainer">
                <!-- Answers will be dynamically generated here -->
            </div>

            <div class="write-answer-form">
                <h3>답변 작성</h3>
                <textarea class="form-control" rows="5" placeholder="답변을 입력하세요..."></textarea>
                <button class="btn-primary" onclick="submitAnswer()">답변 등록</button>
            </div>
        </div>
    </div>

    <!-- Write Question Modal -->
    <div id="writeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>질문 작성</h3>
                <button class="close-btn" onclick="hideWriteModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">카테고리</label>
                    <select class="form-control" id="questionCategory">
                        <option value="isms-p">ISMS-P</option>
                        <option value="iso27001">ISO 27001</option>
                        <option value="gs">GS 인증</option>
                        <option value="general">기타</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">제목</label>
                    <input type="text" class="form-control" id="questionTitle" placeholder="질문 제목을 입력하세요">
                </div>
                <div class="form-group">
                    <label class="form-label">내용</label>
                    <textarea class="form-control" rows="8" id="questionContent" placeholder="궁금한 점을 상세히 설명해주세요"></textarea>
                </div>
                <button class="btn-primary" onclick="submitQuestion()">질문 등록</button>
            </div>
        </div>
    </div>

                <div class="answer-section">
                    <div class="answer-count">${questionAnswers.length}개의 답변</div>
                    ${questionAnswers.map(a => `
                        <div class="answer-card ${a.isBest ? 'best' : ''}">
                            ${a.isBest ? '<span class="best-answer-badge">베스트 답변</span>' : ''}
                            <div class="answer-header">
                                <span class="answer-author">${a.author}</span>
                                ${a.isExpert ? '<span class="expert-badge">전문가</span>' : ''}
                            </div>
                            <p class="answer-body">${a.content}</p>
                            <div class="answer-actions">
                                <button><i class="fas fa-heart"></i> ${a.likes}</button>
                                <button><i class="fas fa-comment"></i> 댓글</button>
                            </div>
                            
                            <!-- Comments Section -->
                            <div class="comments-section">
                                ${renderComments(a.id)}
                                <div class="comment-input-container">
                                    <input type="text" class="comment-input" id="comment-input-${a.id}" placeholder="댓글을 입력하세요..." onkeypress="handleCommentKeyPress(event, ${a.id})">
                                    <button class="comment-submit-btn" onclick="submitComment(${a.id})">등록</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            showView('questionDetail');
        }

        // Render comments for an answer
        function renderComments(answerId) {
            const answerComments = comments[answerId] || [];
            if (answerComments.length === 0) {
                return '';
            }
            
            return answerComments.map(c => `
                <div class="comment-item">
                    <div class="comment-avatar">${c.author.charAt(0)}</div>
                    <div class="comment-content">
                        <div class="comment-author">${c.author}</div>
                        <div class="comment-text">${c.text}</div>
                        <div class="comment-date">${c.date}</div>
                    </div>
                </div>
            `).join('');
        }

        // Submit comment
        function submitComment(answerId) {
            const input = document.getElementById(`comment-input-${answerId}`);
            const text = input.value.trim();
            
            if (!text) {
                alert('댓글을 입력해주세요.');
                return;
            }
            
            // Initialize comments array if it doesn't exist
            if (!comments[answerId]) {
                comments[answerId] = [];
            }
            
            // Add new comment
            const newComment = {
                id: Date.now(),
                author: '현재사용자',
                text: text,
                date: new Date().toLocaleString('ko-KR', { 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                }).replace(/\./g, '-').replace(/ /g, ' ')
            };
            
            comments[answerId].push(newComment);
            
            // Clear input
            input.value = '';
            
            // Re-render the question detail to show the new comment
            const currentQuestionId = document.querySelector('.question-detail').querySelector('.qa-category').textContent === 'ISMS-P' ? 1 : 
                                     document.querySelector('.question-detail').querySelector('.qa-category').textContent === 'ISO 27001' ? 2 : 3;
            showQuestionDetail(currentQuestionId);
        }

        // Handle Enter key press in comment input
        function handleCommentKeyPress(event, answerId) {
            if (event.key === 'Enter') {
                submitComment(answerId);
            }
        }
        
        // Modal Functions
        function showWriteModal() {
            document.getElementById('writeModal').style.display = 'block';
        }

        function hideWriteModal() {
            document.getElementById('writeModal').style.display = 'none';
        }

        // Submit Functions (Mock)
        function submitQuestion() {
            const title = document.getElementById('questionTitle').value;
            const content = document.getElementById('questionContent').value;
            if (title && content) {
                alert('질문이 등록되었습니다.');
                hideWriteModal();
                // In a real app, add to questions array and re-render
            } else {
                alert('제목과 내용을 모두 입력해주세요.');
            }
        }

        function submitAnswer() {
            alert('답변이 등록되었습니다.');
            // In a real app, add to answers array and re-render
        }

        // Interaction Functions (Mock)
        function toggleLike(questionId) {
            const question = questions.find(q => q.id === questionId);
            question.isLiked = !question.isLiked;
            question.likes += question.isLiked ? 1 : -1;
            renderQAList();
        }

        function toggleBookmark(questionId) {
            const question = questions.find(q => q.id === questionId);
            question.isBookmarked = !question.isBookmarked;
            renderQAList();
        }

        function sortQuestions(type) {
            if (type === 'latest') {
                questions.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else if (type === 'popular') {
                questions.sort((a, b) => b.likes - a.likes);
            }
            renderQAList();
            
            // Update active tab
            document.querySelectorAll('.sort-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('writeModal');
            if (event.target == modal) {
                hideWriteModal();
            }
        }

        // Initial render
        document.addEventListener('DOMContentLoaded', () => {
            renderQAList();
        });
    </script>
</body>
</html>
